<!-- ============================================
   LOGIN PAGE
   User authentication - email & password
   ============================================ -->
<div class="auth-layout" id="login-page">
    <div class="auth-layout__card">
        <!-- Header -->
        <div class="auth-header">
            <div class="auth-logo">
                <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
                    <circle cx="25" cy="25" r="24" fill="var(--color-primary-100)" stroke="var(--color-primary-500)" stroke-width="2"/>
                    <path d="M15 30L25 22L35 30L25 35L15 30Z" fill="var(--color-primary-500)"/>
                    <path d="M25 22V30" stroke="var(--color-primary-600)" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="auth-title">Welcome Back!</h1>
            <p class="auth-subtitle">Sign in to continue your learning journey</p>
        </div>
        
        <!-- Social Login Buttons -->
        <div class="auth-social">
            <button class="btn btn-outline-primary btn-block btn-social" id="google-login">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
        </div>
        
        <!-- Divider -->
        <div class="divider-with-text">or sign in with email</div>
        
        <!-- Login Form -->
        <form class="form-layout" id="login-form" novalidate>
            <!-- Email -->
            <div class="form-group">
                <label class="form-label form-label--required" for="login-email">
                    Email Address
                </label>
                <div class="input-with-icon">
                    <svg class="input-with-icon__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input 
                        type="email" 
                        id="login-email" 
                        name="email" 
                        class="form-input" 
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                </div>
                <span class="helper-text helper-text--error" id="login-email-error"></span>
            </div>
            
            <!-- Password -->
            <div class="form-group">
                <div class="flex justify-between items-center">
                    <label class="form-label form-label--required" for="login-password">
                        Password
                    </label>
                    <a href="#/forgot-password" class="text-sm text-link link-hover">
                        Forgot password?
                    </a>
                </div>
                <div class="input-with-icon input-with-icon--right">
                    <svg class="input-with-icon__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <input 
                        type="password" 
                        id="login-password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="password-toggle" id="login-password-toggle" aria-label="Toggle password visibility">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye-icon">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <span class="helper-text helper-text--error" id="login-password-error"></span>
            </div>
            
            <!-- Remember Me -->
            <div class="flex justify-between items-center">
                <label class="checkbox-group">
                    <input type="checkbox" id="remember-me" name="rememberMe">
                    <span class="text-sm text-secondary">Remember me</span>
                </label>
            </div>
            
            <!-- Submit -->
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-submit">
                Sign In
            </button>
        </form>
        
        <!-- Register Link -->
        <p class="auth-footer-text">
            Don't have an account? 
            <a href="#/register" class="text-link font-medium">
                Create one
            </a>
        </p>
    </div>
</div>

<style>
    .auth-header {
        text-align: center;
        margin-bottom: var(--space-6);
    }
    
    .auth-logo {
        display: inline-flex;
        margin-bottom: var(--space-4);
    }
    
    .auth-title {
        font-size: var(--text-2xl);
        font-weight: var(--font-bold);
        color: var(--text-primary);
        margin-bottom: var(--space-1);
    }
    
    .auth-subtitle {
        color: var(--text-secondary);
        font-size: var(--text-sm);
    }
    
    .auth-social {
        margin-bottom: var(--space-4);
    }
    
    .btn-social {
        gap: var(--space-3);
        background-color: var(--bg-primary);
        border: 2px solid var(--border-color);
        color: var(--text-primary);
    }
    
    .btn-social:hover {
        background-color: var(--bg-hover);
        border-color: var(--border-color-hover);
    }
    
    .auth-footer-text {
        text-align: center;
        margin-top: var(--space-6);
        font-size: var(--text-sm);
        color: var(--text-secondary);
    }
</style>

<script>
    (function() {
        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('login-email');
        const passwordInput = document.getElementById('login-password');
        const emailError = document.getElementById('login-email-error');
        const passwordError = document.getElementById('login-password-error');
        const submitBtn = document.getElementById('login-submit');
        const toggleBtn = document.getElementById('login-password-toggle');
        
        // Password visibility toggle
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            
            const eyeIcon = document.getElementById('eye-icon');
            if (type === 'text') {
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                `;
            } else {
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                `;
            }
        });
        
        // Form validation & submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset errors
            emailError.textContent = '';
            passwordError.textContent = '';
            emailInput.classList.remove('form-input--error');
            passwordInput.classList.remove('form-input--error');
            
            // Validate
            let hasError = false;
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email) {
                emailError.textContent = 'Email is required';
                emailInput.classList.add('form-input--error');
                hasError = true;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                emailError.textContent = 'Please enter a valid email';
                emailInput.classList.add('form-input--error');
                hasError = true;
            }
            
            if (!password) {
                passwordError.textContent = 'Password is required';
                passwordInput.classList.add('form-input--error');
                hasError = true;
            } else if (password.length < 6) {
                passwordError.textContent = 'Password must be at least 6 characters';
                passwordInput.classList.add('form-input--error');
                hasError = true;
            }
            
            if (hasError) return;
            
            // Submit
            submitBtn.classList.add('btn-loading');
            submitBtn.textContent = 'Signing in...';
            
            try {
                // Import auth module dynamically
                const { default: auth } = await import('../js/auth.js');
                
                const rememberMe = document.getElementById('remember-me').checked;
                await auth.login(email, password, rememberMe);
                
                // Navigate to dashboard
                const redirect = new URLSearchParams(window.location.hash.split('?')[1] || '').get('redirect') || 'dashboard';
                window.location.hash = `#/${redirect}`;
                
            } catch (error) {
                passwordError.textContent = error.message || 'Login failed. Please try again.';
                passwordInput.classList.add('form-input--error');
            } finally {
                submitBtn.classList.remove('btn-loading');
                submitBtn.textContent = 'Sign In';
            }
        });
        
        // Demo credentials hint (remove in production)
        console.log('Demo: Use any email/password to login (local mode)');
    })();
</script>
