<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#4A90D9">
    <meta name="description" content="Student App - Your Complete Academic Companion">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Student App">
    
    <title>Student App - Academic Companion</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%233B82F6'/><text x='32' y='44' text-anchor='middle' font-size='32'>🎓</text></svg>">
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            --color-primary-50: #EFF6FF; --color-primary-100: #DBEAFE; --color-primary-200: #BFDBFE;
            --color-primary-300: #93C5FD; --color-primary-400: #60A5FA; --color-primary-500: #3B82F6;
            --color-primary-600: #2563EB; --color-primary-700: #1D4ED8; --color-primary-800: #1E40AF;
            --color-primary-900: #1E3A8A; --color-secondary-500: #8B5CF6; --color-success-500: #22C55E;
            --color-warning-500: #F59E0B; --color-error-500: #EF4444;
            --color-gray-50: #F9FAFB; --color-gray-100: #F3F4F6; --color-gray-200: #E5E7EB;
            --color-gray-300: #D1D5DB; --color-gray-400: #9CA3AF; --color-gray-500: #6B7280;
            --color-gray-600: #4B5563; --color-gray-700: #374151; --color-gray-800: #1F2937;
            --color-gray-900: #111827;
            --bg-primary: #FFFFFF; --bg-secondary: #F9FAFB; --bg-tertiary: #F3F4F6;
            --text-primary: #111827; --text-secondary: #6B7280; --text-tertiary: #9CA3AF;
            --text-link: #2563EB; --border-color: #E5E7EB; --card-bg: #FFFFFF;
            --input-bg: #FFFFFF; --input-border: #D1D5DB;
            --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
            --space-5: 20px; --space-6: 24px; --space-8: 32px;
            --border-radius-md: 6px; --border-radius-lg: 8px; --border-radius-xl: 12px;
            --border-radius-full: 9999px; --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
        
        #loading-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #3B82F6, #1D4ED8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 16px; color: white; transition: opacity 0.3s;
        }
        .spinner {
            width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .auth-layout {
            display: flex; flex-direction: column; justify-content: center;
            min-height: 100vh; padding: 20px; background: var(--bg-secondary);
        }
        .auth-layout-card {
            max-width: 440px; width: 100%; margin: 0 auto;
            background: var(--card-bg); border-radius: 16px; box-shadow: var(--shadow-md);
            padding: 24px;
        }
        .auth-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 4px; }
        .auth-subtitle { color: var(--text-secondary); font-size: 14px; text-align: center; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
        .form-input {
            width: 100%; padding: 10px 12px; font-size: 16px; border: 2px solid var(--input-border);
            border-radius: var(--border-radius-md); background: var(--input-bg); color: var(--text-primary);
        }
        .form-input:focus { outline: none; border-color: #3B82F6; }
        .form-input--error { border-color: #EF4444; }
        .helper-text--error { color: #EF4444; font-size: 12px; }
        
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 12px 20px; font-size: 15px; font-weight: 600; border-radius: var(--border-radius-md);
            border: none; cursor: pointer; width: 100%; transition: all 0.2s;
        }
        .btn-primary { background: #3B82F6; color: white; }
        .btn-primary:hover { background: #2563EB; }
        .btn-outline { background: transparent; border: 2px solid #D1D5DB; color: var(--text-primary); }
        .btn-loading { opacity: 0.7; pointer-events: none; }
        
        .card { background: var(--card-bg); border-radius: var(--border-radius-lg); border: 1px solid var(--border-color); }
        .text-link { color: #2563EB; text-decoration: none; }
        .badge { display: inline-block; padding: 2px 8px; font-size: 11px; font-weight: 600; border-radius: 10px; }
        .badge--success { background: #DCFCE7; color: #15803D; }
        .badge--warning { background: #FEF3C7; color: #B45309; }
        .badge--error { background: #FEE2E2; color: #B91C1C; }
        .badge--primary { background: #DBEAFE; color: #1D4ED8; }
        
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: var(--card-bg); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; padding: 8px 0 20px;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            font-size: 11px; color: var(--text-tertiary); text-decoration: none; cursor: pointer; background: none; border: none;
        }
        .tab-item--active { color: #3B82F6; }
        .tab-icon { font-size: 22px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        .stat-card { text-align: center; padding: 14px 8px; }
        .stat-value { font-size: 20px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-secondary); }
        
        .error-screen {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: var(--bg-primary); flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; text-align: center;
        }
        
        .mb-3 { margin-bottom: 12px; }
        .mb-4 { margin-bottom: 16px; }
        .mt-2 { margin-top: 8px; }
        .text-center { text-align: center; }
        .text-sm { font-size: 13px; }
        .text-xs { font-size: 11px; }
        .text-secondary { color: var(--text-secondary); }
        .text-success { color: #22C55E; }
        .text-warning { color: #F59E0B; }
        .text-error { color: #EF4444; }
        .font-semibold { font-weight: 600; }
        .font-bold { font-weight: 700; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div style="font-size:50px;">🎓</div>
        <div class="spinner"></div>
        <p style="font-weight:500;">Loading Student App...</p>
    </div>
    
    <div id="error-screen" class="error-screen">
        <div style="font-size:60px;">⚠️</div>
        <h2 style="color:#EF4444;">App Load Error</h2>
        <p style="color:#6B7280;" id="error-msg"></p>
        <button onclick="location.reload()" class="btn btn-primary" style="width:auto;margin-top:12px;">Reload</button>
    </div>
    
    <main id="main-content"></main>

    <script>
    // ============================================
    // STUDENT APP - COMPLETE APPLICATION
    // ============================================

    var App = {
        currentPage: 'splash',
        user: null,
        users: [],
        
        init: function() {
            console.log('App starting...');
            this.loadUsers();
            this.setupRouting();
            this.hideLoading();
            this.navigate('login');
        },
        
        loadUsers: function() {
            try {
                this.users = JSON.parse(localStorage.getItem('student_app_users') || '[]');
            } catch(e) {
                this.users = [];
            }
        },
        
        saveUsers: function() {
            localStorage.setItem('student_app_users', JSON.stringify(this.users));
        },
        
        hideLoading: function() {
            var loader = document.getElementById('loading-screen');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(function() { loader.remove(); }, 300);
            }
        },
        
        setupRouting: function() {
            var self = this;
            window.addEventListener('hashchange', function() {
                self.handleRoute();
            });
            if (!window.location.hash) {
                window.location.hash = '#/login';
            }
            this.handleRoute();
        },
        
        handleRoute: function() {
            var hash = window.location.hash.slice(1) || '/login';
            var page = hash.split('/')[1] || 'login';
            this.currentPage = page;
            this.renderPage(page);
        },
        
        navigate: function(page) {
            window.location.hash = '#/' + page;
        },
        
        renderPage: function(page) {
            var container = document.getElementById('main-content');
            if (!container) return;
            
            switch(page) {
                case 'splash': container.innerHTML = this.getSplashPage(); break;
                case 'login': container.innerHTML = this.getLoginPage(); break;
                case 'register': container.innerHTML = this.getRegisterPage(); break;
                case 'dashboard': container.innerHTML = this.getDashboardPage(); break;
                case 'profile': container.innerHTML = this.getProfilePage(); break;
                case 'subjects': container.innerHTML = this.getSubjectsPage(); break;
                case 'attendance': container.innerHTML = this.getAttendancePage(); break;
                case 'assignments': container.innerHTML = this.getAssignmentsPage(); break;
                case 'notes': container.innerHTML = this.getNotesPage(); break;
                case 'timetable': container.innerHTML = this.getTimetablePage(); break;
                case 'teachers': container.innerHTML = this.getTeachersPage(); break;
                case 'quiz': container.innerHTML = this.getQuizPage(); break;
                case 'results': container.innerHTML = this.getResultsPage(); break;
                case 'ai-assistant': container.innerHTML = this.getAIPage(); break;
                case 'settings': container.innerHTML = this.getSettingsPage(); break;
                default: container.innerHTML = this.getDashboardPage();
            }
            
            this.attachEvents(page);
        },
        
        attachEvents: function(page) {
            var self = this;
            
            if (page === 'login') {
                var form = document.getElementById('login-form');
                if (form) {
                    form.addEventListener('submit', function(e) {
                        e.preventDefault();
                        self.handleLogin();
                    });
                }
                var regLink = document.getElementById('go-register');
                if (regLink) {
                    regLink.addEventListener('click', function(e) {
                        e.preventDefault();
                        self.navigate('register');
                    });
                }
            }
            
            if (page === 'register') {
                var nextBtn = document.getElementById('step1-next');
                if (nextBtn) {
                    nextBtn.addEventListener('click', function() {
                        self.goToStep2();
                    });
                }
                var backBtn = document.getElementById('step2-back');
                if (backBtn) {
                    backBtn.addEventListener('click', function() {
                        self.goToStep1();
                    });
                }
                var regForm = document.getElementById('register-form');
                if (regForm) {
                    regForm.addEventListener('submit', function(e) {
                        e.preventDefault();
                        self.handleRegister();
                    });
                }
            }
            
            if (page === 'dashboard') {
                var logoutBtn = document.getElementById('logout-btn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', function() {
                        self.logout();
                    });
                }
            }
        },
        
        // ========== AUTH ==========
        handleLogin: function() {
            var email = document.getElementById('login-email').value.trim();
            var password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                alert('Please fill all fields');
                return;
            }
            
            var user = this.users.find(function(u) {
                return u.email === email && u.password === password;
            });
            
            if (!user) {
                // Auto-create for demo
                user = {
                    id: 'user_' + Date.now(),
                    name: email.split('@')[0],
                    email: email,
                    password: password,
                    phone: '',
                    createdAt: new Date().toISOString()
                };
                this.users.push(user);
                this.saveUsers();
            }
            
            this.user = user;
            localStorage.setItem('student_app_current_user', JSON.stringify(user));
            this.navigate('dashboard');
        },
        
        handleRegister: function() {
            var name = document.getElementById('reg-name').value.trim();
            var email = document.getElementById('reg-email').value.trim();
            var phone = document.getElementById('reg-phone').value.trim();
            var password = document.getElementById('reg-password').value;
            var confirm = document.getElementById('reg-confirm').value;
            
            if (!name || !email || !password) {
                alert('Please fill all required fields');
                return;
            }
            
            if (password !== confirm) {
                alert('Passwords do not match');
                return;
            }
            
            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            var existing = this.users.find(function(u) { return u.email === email; });
            if (existing) {
                alert('Email already registered. Please login.');
                this.navigate('login');
                return;
            }
            
            var newUser = {
                id: 'user_' + Date.now(),
                name: name,
                email: email,
                phone: phone,
                password: password,
                createdAt: new Date().toISOString()
            };
            
            this.users.push(newUser);
            this.saveUsers();
            this.user = newUser;
            localStorage.setItem('student_app_current_user', JSON.stringify(newUser));
            this.navigate('dashboard');
        },
        
        goToStep2: function() {
            var name = document.getElementById('reg-name').value.trim();
            var email = document.getElementById('reg-email').value.trim();
            
            if (!name) { alert('Please enter your name'); return; }
            if (!email || email.indexOf('@') === -1) { alert('Please enter a valid email'); return; }
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('dot1').className = 'step-dot done';
            document.getElementById('dot2').className = 'step-dot active';
        },
        
        goToStep1: function() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
            document.getElementById('dot1').className = 'step-dot active';
            document.getElementById('dot2').className = 'step-dot';
        },
        
        logout: function() {
            this.user = null;
            localStorage.removeItem('student_app_current_user');
            this.navigate('login');
        },
        
        // ========== PAGES ==========
        getSplashPage: function() {
            return '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:white;text-align:center;"><div><div style="font-size:80px;">🎓</div><h1 style="font-size:28px;">Student App</h1><p>Your Academic Companion</p></div></div>';
        },
        
        getLoginPage: function() {
            return `
            <div class="auth-layout">
                <div class="auth-layout-card">
                    <h1 class="auth-title">Welcome Back!</h1>
                    <p class="auth-subtitle">Sign in to continue learning</p>
                    <form id="login-form">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="login-password" class="form-input" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Sign In</button>
                    </form>
                    <p class="text-center mt-2 text-sm text-secondary">
                        Don't have an account? <a href="#" id="go-register" class="text-link">Register</a>
                    </p>
                    <p class="text-center text-xs text-secondary mt-2">Demo: Any email & password works</p>
                </div>
            </div>`;
        },
        
        getRegisterPage: function() {
            return `
            <div class="auth-layout">
                <div class="auth-layout-card">
                    <h1 class="auth-title">Create Account</h1>
                    <p class="auth-subtitle">Start your learning journey</p>
                    <div style="display:flex;justify-content:center;gap:20px;margin-bottom:20px;">
                        <div class="step-dot active" id="dot1" style="width:30px;height:30px;border-radius:50%;background:#3B82F6;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;">1</div>
                        <div style="width:40px;height:2px;background:#D1D5DB;align-self:center;"></div>
                        <div class="step-dot" id="dot2" style="width:30px;height:30px;border-radius:50%;background:#E5E7EB;color:#9CA3AF;display:flex;align-items:ce
