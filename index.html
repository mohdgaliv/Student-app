<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#4A90D9">
    <meta name="description" content="Student App - Your Complete Academic Companion">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Student App">
    
    <title>Student App - Academic Companion</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <style>
        /* Critical loading styles */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: linear-gradient(135deg, #3B82F6, #1D4ED8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            transition: opacity 0.5s ease;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            font-weight: 500;
        }
        
        .loading-subtext {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        #main-content {
            min-height: 100vh;
            background: var(--bg-primary);
        }
        
        /* Error state */
        .error-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #FFFFFF;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        [data-theme="dark"] .error-screen {
            background: #0F172A;
            color: #F1F5F9;
        }
    </style>
</head>
<body>
    <!-- App Shell -->
    <div id="app">
        
        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="loading-logo">🎓</div>
            <div class="spinner"></div>
            <div class="loading-text">Loading Student App...</div>
            <div class="loading-subtext" id="loading-status">Initializing...</div>
        </div>
        
        <!-- Error Screen (hidden initially) -->
        <div id="error-screen" class="error-screen">
            <div style="font-size: 64px; margin-bottom: 20px;">⚠️</div>
            <h2 style="margin-bottom: 12px; color: #EF4444;">App Load Error</h2>
            <p style="color: #6B7280; margin-bottom: 8px;" id="error-message">
                Failed to load the application.
            </p>
            <p style="color: #9CA3AF; font-size: 14px; margin-bottom: 20px;" id="error-detail">
                Please check your connection and file structure.
            </p>
            <button onclick="location.reload()" 
                    style="padding: 12px 30px; background: #3B82F6; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 500;">
                🔄 Reload App
            </button>
            <button onclick="document.getElementById('debug-info').style.display='block'" 
                    style="margin-top: 12px; padding: 8px 20px; background: transparent; color: #6B7280; border: 1px solid #D1D5DB; border-radius: 8px; cursor: pointer; font-size: 13px;">
                🔍 Show Debug Info
            </button>
            <div id="debug-info" style="display:none; margin-top: 16px; text-align: left; background: #F3F4F6; padding: 16px; border-radius: 8px; font-size: 12px; max-width: 400px; word-break: break-all;">
                <strong>Debug Info:</strong>
                <pre id="debug-content" style="margin-top: 8px; white-space: pre-wrap;">Loading debug info...</pre>
            </div>
        </div>
        
        <!-- Main Content Area -->
        <main id="main-content" role="main"></main>
        
        <!-- Toast Container -->
        <div id="toast-container" class="toast-container" aria-live="polite"></div>
        
        <!-- Modal Container -->
        <div id="modal-container" class="modal-container" aria-hidden="true"></div>
    </div>

    <!-- ============================================ -->
    <!-- APPLICATION BOOTSTRAP                         -->
    <!-- ============================================ -->
    
    <script type="module">
        // Update loading status
        function updateStatus(msg) {
            const el = document.getElementById('loading-status');
            if (el) el.textContent = msg;
        }
        
        // Show error screen
        function showError(message, detail) {
            document.getElementById('loading-screen').style.display = 'none';
            const errorScreen = document.getElementById('error-screen');
            errorScreen.style.display = 'flex';
            document.getElementById('error-message').textContent = message || 'Failed to load the application.';
            document.getElementById('error-detail').textContent = detail || '';
            
            // Collect debug info
            const debugInfo = {
                url: window.location.href,
                userAgent: navigator.userAgent,
                timestamp: new Date().toISOString(),
                modules: [],
                errors: []
            };
            
            document.getElementById('debug-content').textContent = JSON.stringify(debugInfo, null, 2);
        }
        
        // Load a module with error handling
        async function loadModule(path, name) {
            try {
                updateStatus(`Loading ${name}...`);
                const module = await import('./' + path);
                console.log(`✅ ${name} loaded`);
                return module;
            } catch (error) {
                console.error(`❌ Failed to load ${name}:`, error);
                throw new Error(`${name} failed to load: ${error.message}`);
            }
        }
        
        // Main initialization
        async function initApp() {
            try {
                updateStatus('Loading core modules...');
                
                // Step 1: Load utils (no dependencies)
                const utils = await loadModule('js/utils.js', 'Utils');
                
                // Step 2: Load event bus
                const eventBus = await loadModule('js/event-bus.js', 'EventBus');
                
                // Step 3: Load storage
                const storage = await loadModule('js/storage.js', 'Storage');
                
                // Step 4: Load state manager
                updateStatus('Setting up state manager...');
                const stateModule = await loadModule('js/state-manager.js', 'StateManager');
                
                // Step 5: Load theme manager
                updateStatus('Applying theme...');
                const themeModule = await loadModule('js/theme-manager.js', 'ThemeManager');
                if (themeModule.default) {
                    themeModule.default.init();
                }
                
                // Step 6: Load remaining modules
                await loadModule('js/validator.js', 'Validator');
                await loadModule('js/formatter.js', 'Formatter');
                await loadModule('js/notifications.js', 'Notifications');
                await loadModule('js/api.js', 'API');
                await loadModule('js/auth.js', 'Auth');
                await loadModule('js/pwa.js', 'PWA');
                await loadModule('js/router.js', 'Router');
                
                // Step 7: Initialize app
                updateStatus('Starting app...');
                const appModule = await loadModule('js/app.js', 'App');
                
                // Hide loading screen
                setTimeout(() => {
                    const loader = document.getElementById('loading-screen');
                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 500);
                    }
                }, 500);
                
                console.log('🎉 App initialized successfully!');
                
            } catch (error) {
                console.error('❌ App initialization failed:', error);
                showError(
                    'Failed to load application modules.',
                    error.message + '\n\nPlease ensure all JS files are present in the js/ folder.'
                );
            }
        }
        
        // Start the app
        initApp();
    </script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration skipped:', err.message));
            });
        }
    </script>
</body>
</html>
