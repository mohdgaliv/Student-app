<!-- ============================================
   REGISTER PAGE
   New user account creation
   ============================================ -->
<div class="auth-layout" id="register-page">
    <div class="auth-layout__card">
        <!-- Header -->
        <div class="auth-header">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Start your academic journey today</p>
        </div>
        
        <!-- Progress Steps -->
        <div class="register-steps" id="register-steps">
            <div class="step step--active" data-step="1">1</div>
            <div class="step-line"></div>
            <div class="step" data-step="2">2</div>
        </div>
        
        <!-- Step 1: Account Details -->
        <form class="form-layout register-step-content" id="register-step-1" novalidate>
            <!-- Full Name -->
            <div class="form-group">
                <label class="form-label form-label--required" for="reg-name">Full Name</label>
                <div class="input-with-icon">
                    <svg class="input-with-icon__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" id="reg-name" name="name" class="form-input" placeholder="John Doe" required>
                </div>
                <span class="helper-text helper-text--error" id="reg-name-error"></span>
            </div>
            
            <!-- Email -->
            <div class="form-group">
                <label class="form-label form-label--required" for="reg-email">Email Address</label>
                <div class="input-with-icon">
                    <svg class="input-with-icon__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input type="email" id="reg-email" name="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <span class="helper-text helper-text--error" id="reg-email-error"></span>
            </div>
            
            <!-- Phone (Optional) -->
            <div class="form-group">
                <label class="form-label" for="reg-phone">Phone Number</label>
                <div class="input-with-icon">
                    <svg class="input-with-icon__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
                    </svg>
                    <input type="tel" id="reg-phone" name="phone" class="form-input" placeholder="+91 98765 43210">
                </div>
            </div>
            
            <button type="button" class="btn btn-primary btn-block btn-lg" id="step-1-next">
                Continue
            </button>
        </form>
        
        <!-- Step 2: Password -->
        <form class="form-layout register-step-content" id="register-step-2" style="display:none;" novalidate>
            <!-- Password -->
            <div class="form-group">
                <label class="form-label form-label--required" for="reg-password">Password</label>
                <div class="input-with-icon input-with-icon--right">
                    <svg class="input-with-icon__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <input type="password" id="reg-password" name="password" class="form-input" placeholder="Min. 8 characters" required>
                    <button type="button" class="password-toggle" data-target="reg-password" aria-label="Toggle visibility">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <!-- Password Strength Meter -->
                <div class="password-strength" id="password-strength" style="display:none;">
                    <div class="password-strength__bar">
                        <div class="password-strength__fill" id="strength-fill"></div>
                    </div>
                    <span class="password-strength__text" id="strength-text"></span>
                </div>
                <span class="helper-text helper-text--error" id="reg-password-error"></span>
            </div>
            
            <!-- Confirm Password -->
            <div class="form-group">
                <label class="form-label form-label--required" for="reg-confirm-password">Confirm Password</label>
                <div class="input-with-icon input-with-icon--right">
                    <svg class="input-with-icon__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <input type="password" id="reg-confirm-password" name="confirmPassword" class="form-input" placeholder="Re-enter password" required>
                </div>
                <span class="helper-text helper-text--error" id="reg-confirm-error"></span>
            </div>
            
            <!-- Terms -->
            <label class="checkbox-group">
                <input type="checkbox" id="reg-terms" required>
                <span class="text-sm text-secondary">
                    I agree to the 
                    <a href="#/terms" class="text-link">Terms of Service</a>
                     and 
                    <a href="#/privacy" class="text-link">Privacy Policy</a>
                </span>
            </label>
            
            <div class="flex gap-2">
                <button type="button" class="btn btn-outline-primary" id="step-2-back">
                    Back
                </button>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-submit">
                    Create Account
                </button>
            </div>
        </form>
        
        <!-- Login Link -->
        <p class="auth-footer-text">
            Already have an account? 
            <a href="#/login" class="text-link font-medium">Sign in</a>
        </p>
    </div>
</div>

<style>
    .register-steps {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        margin-bottom: var(--space-6);
    }
    
    .step {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: var(--font-bold);
        font-size: var(--text-sm);
        background-color: var(--bg-tertiary);
        color: var(--text-tertiary);
        transition: all var(--transition-fast);
    }
    
    .step--active {
        background-color: var(--color-primary-500);
        color: #FFFFFF;
    }
    
    .step--completed {
        background-color: var(--color-success-500);
        color: #FFFFFF;
    }
    
    .step-line {
        width: 60px;
        height: 2px;
        background-color: var(--border-color);
        margin: 0 var(--space-2);
        transition: background-color var(--transition-fast);
    }
    
    .step-line--completed {
        background-color: var(--color-success-500);
    }
    
    .password-strength {
        margin-top: var(--space-2);
    }
    
    .password-strength__bar {
        height: 4px;
        background-color: var(--bg-tertiary);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: var(--space-1);
    }
    
    .password-strength__fill {
        height: 100%;
        border-radius: 2px;
        transition: all var(--transition-base);
        width: 0%;
    }
    
    .password-strength__text {
        font-size: var(--text-xs);
        font-weight: var(--font-medium);
    }
</style>

<script>
    (function() {
        let currentStep = 1;
        
        const step1 = document.getElementById('register-step-1');
        const step2 = document.getElementById('register-step-2');
        const stepDots = document.querySelectorAll('.step');
        const stepLine = document.querySelector('.step-line');
        
        // Step navigation
        document.getElementById('step-1-next').addEventListener('click', () => {
            // Validate step 1
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            let hasError = false;
            
            if (!name) {
                document.getElementById('reg-name-error').textContent = 'Name is required';
                document.getElementById('reg-name').classList.add('form-input--error');
                hasError = true;
            }
            
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('reg-email-error').textContent = 'Valid email is required';
                document.getElementById('reg-email').classList.add('form-input--error');
                hasError = true;
            }
            
            if (hasError) return;
            
            // Go to step 2
            currentStep = 2;
            step1.style.display = 'none';
            step2.style.display = 'flex';
            stepDots[0].classList.remove('step--active');
            stepDots[0].classList.add('step--completed');
            stepDots[1].classList.add('step--active');
            stepLine.classList.add('step-line--completed');
        });
        
        document.getElementById('step-2-back').addEventListener('click', () => {
            currentStep = 1;
            step2.style.display = 'none';
            step1.style.display = 'flex';
            stepDots[0].classList.add('step--active');
            stepDots[0].classList.remove('step--completed');
            stepDots[1].classList.remove('step--active');
            stepLine.classList.remove('step-line--completed');
        });
        
        // Password strength checker
        const passwordInput = document.getElementById('reg-password');
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            const strengthDiv = document.getElementById('password-strength');
            const strengthFill = document.getElementById('strength-fill');
            const strengthText = document.getElementById('strength-text');
            
            if (!password) {
                strengthDiv.style.display = 'none';
                return;
            }
            
            strengthDiv.style.display = 'block';
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            const percent = (strength / 5) * 100;
            strengthFill.style.width = percent + '%';
            
            if (strength <= 2) {
                strengthFill.style.backgroundColor = 'var(--color-error-500)';
                strengthText.textContent = 'Weak';
                strengthText.style.color = 'var(--color-error-500)';
            } else if (strength <= 4) {
                strengthFill.style.backgroundColor = 'var(--color-warning-500)';
                strengthText.textContent = 'Medium';
                strengthText.style.color = 'var(--color-warning-500)';
            } else {
                strengthFill.style.backgroundColor = 'var(--color-success-500)';
                strengthText.textContent = 'Strong';
                strengthText.style.color = 'var(--color-success-500)';
            }
        });
        
        // Form submission
        document.getElementById('register-step-2').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;
            const terms = document.getElementById('reg-terms').checked;
            let hasError = false;
            
            if (password.length < 8) {
                document.getElementById('reg-password-error').textContent = 'Minimum 8 characters';
                hasError = true;
            }
            
            if (password !== confirmPassword) {
                document.getElementById('reg-confirm-error').textContent = 'Passwords do not match';
                hasError = true;
            }
            
            if (!terms) {
                alert('Please agree to the Terms of Service');
                hasError = true;
            }
            
            if (hasError) return;
            
            const submitBtn = document.getElementById('register-submit');
            submitBtn.classList.add('btn-loading');
            submitBtn.textContent = 'Creating Account...';
            
            try {
                const { default: auth } = await import('../js/auth.js');
                
                await auth.register({
                    name: document.getElementById('reg-name').value,
                    email: document.getElementById('reg-email').value,
                    phone: document.getElementById('reg-phone').value,
                    password: password
                });
                
                window.location.hash = '#/dashboard';
            } catch (error) {
                document.getElementById('reg-email-error').textContent = error.message;
            } finally {
                submitBtn.classList.remove('btn-loading');
                submitBtn.textContent = 'Create Account';
            }
        });
    })();
</script>
