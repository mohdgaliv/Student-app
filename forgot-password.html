<!-- ============================================
   FORGOT PASSWORD PAGE
   Password recovery flow
   ============================================ -->
<div class="auth-layout" id="forgot-password-page">
    <div class="auth-layout__card">
        <!-- Header -->
        <div class="auth-header">
            <div class="auth-logo">
                <span style="font-size: 48px;">🔐</span>
            </div>
            <h1 class="auth-title">Forgot Password?</h1>
            <p class="auth-subtitle">
                Enter your email address and we'll send you a link to reset your password
            </p>
        </div>
        
        <!-- Email Form (Step 1) -->
        <form class="form-layout" id="forgot-form" novalidate>
            <div class="form-group">
                <label class="form-label form-label--required" for="forgot-email">
                    Email Address
                </label>
                <div class="input-with-icon">
                    <svg class="input-with-icon__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input 
                        type="email" 
                        id="forgot-email" 
                        name="email" 
                        class="form-input" 
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                </div>
                <span class="helper-text helper-text--error" id="forgot-email-error"></span>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="forgot-submit">
                Send Reset Link
            </button>
        </form>
        
        <!-- Success State (Step 2 - hidden initially) -->
        <div id="forgot-success" style="display:none; text-align:center;">
            <div style="font-size: 64px; margin-bottom: var(--space-4);">📧</div>
            <h3 style="margin-bottom: var(--space-2);">Check Your Email</h3>
            <p class="text-secondary" style="margin-bottom: var(--space-4);">
                We've sent a password reset link to<br>
                <strong id="sent-email-display"></strong>
            </p>
            <p class="text-sm text-tertiary">
                Didn't receive the email? Check spam or
                <button class="btn btn-ghost text-link" id="resend-email">resend</button>
            </p>
        </div>
        
        <!-- Back to Login -->
        <div style="text-align:center; margin-top: var(--space-6);">
            <a href="#/login" class="btn btn-ghost">
                ← Back to Login
            </a>
        </div>
    </div>
</div>

<script>
    (function() {
        const form = document.getElementById('forgot-form');
        const successDiv = document.getElementById('forgot-success');
        const emailInput = document.getElementById('forgot-email');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const errorEl = document.getElementById('forgot-email-error');
            
            // Reset
            errorEl.textContent = '';
            emailInput.classList.remove('form-input--error');
            
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errorEl.textContent = 'Please enter a valid email address';
                emailInput.classList.add('form-input--error');
                return;
            }
            
            const submitBtn = document.getElementById('forgot-submit');
            submitBtn.classList.add('btn-loading');
            submitBtn.textContent = 'Sending...';
            
            try {
                const { default: auth } = await import('../js/auth.js');
                await auth.forgotPassword(email);
                
                // Show success state
                form.style.display = 'none';
                successDiv.style.display = 'block';
                document.getElementById('sent-email-display').textContent = email;
                
            } catch (error) {
                errorEl.textContent = error.message || 'Failed to send reset link';
                emailInput.classList.add('form-input--error');
            } finally {
                submitBtn.classList.remove('btn-loading');
                submitBtn.textContent = 'Send Reset Link';
            }
        });
        
        // Resend
        document.getElementById('resend-email').addEventListener('click', () => {
            form.dispatchEvent(new Event('submit'));
        });
    })();
</script>
