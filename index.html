<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3B82F6">
    <title>Student App</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%233B82F6'/><text x='32' y='44' text-anchor='middle' font-size='32'>🎓</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:#fff;color:#111}
        #loading{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#3B82F6,#1D4ED8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff;transition:opacity .3s}
        .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .container{max-width:440px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
        .card{background:#fff;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,.1);padding:24px}
        h1{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px}
        .subtitle{color:#6B7280;font-size:14px;text-align:center;margin-bottom:20px}
        .form-group{margin-bottom:14px}
        label{display:block;font-size:14px;font-weight:500;color:#6B7280;margin-bottom:4px}
        input{width:100%;padding:10px 14px;font-size:15px;border:2px solid #E5E7EB;border-radius:8px;background:#fff;color:#111}
        input:focus{outline:none;border-color:#3B82F6}
        .btn{display:block;width:100%;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer;text-align:center;transition:.2s}
        .btn-primary{background:#3B82F6;color:#fff}
        .btn-primary:hover{background:#2563EB}
        .btn-outline{background:transparent;border:2px solid #E5E7EB;color:#6B7280}
        .btn-outline:hover{background:#F3F4F6}
        .link{color:#2563EB;text-decoration:none;font-weight:500}
        .text-center{text-align:center}
        .text-sm{font-size:13px}
        .text-xs{font-size:11px}
        .text-gray{color:#6B7280}
        .mt-2{margin-top:8px}
        .mt-3{margin-top:12px}
        .mt-4{margin-top:16px}
        .mb-3{margin-bottom:12px}
        .mb-4{margin-bottom:16px}
        .flex{display:flex}
        .gap-2{gap:8px}
        .gap-3{gap:12px}
        .items-center{align-items:center}
        .justify-between{justify-content:space-between}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
        .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
        .badge{display:inline-block;padding:3px 8px;font-size:11px;font-weight:600;border-radius:10px}
        .badge-green{background:#DCFCE7;color:#15803D}
        .badge-yellow{background:#FEF3C7;color:#B45309}
        .badge-red{background:#FEE2E2;color:#B91C1C}
        .badge-blue{background:#DBEAFE;color:#1D4ED8}
        .stat-box{text-align:center;padding:14px 8px;border:1px solid #E5E7EB;border-radius:12px}
        .stat-val{font-size:20px;font-weight:700}
        .stat-lbl{font-size:11px;color:#6B7280;margin-top:2px}
        .nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E5E7EB;display:flex;justify-content:space-around;padding:8px 0 20px;z-index:100}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#9CA3AF;cursor:pointer;border:none;background:none}
        .nav-active{color:#3B82F6}
        .nav-icon{font-size:22px}
        .step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:#E5E7EB;color:#9CA3AF}
        .step-active{background:#3B82F6;color:#fff}
        .step-done{background:#22C55E;color:#fff}
        .step-line{width:40px;height:2px;background:#E5E7EB;align-self:center}
    </style>
</head>
<body>
    <div id="loading"><div style="font-size:50px">🎓</div><div class="spinner"></div><p style="font-weight:500">Loading...</p></div>
    <div id="app"></div>

    <script>
    var App = {
        currentUser: null,
        
        init: function() {
            var self = this;
            var saved = localStorage.getItem('student_user');
            if (saved) { try { this.currentUser = JSON.parse(saved); } catch(e) {} }
            
            setTimeout(function() {
                var loader = document.getElementById('loading');
                if (loader) { loader.style.opacity = '0'; setTimeout(function() { loader.remove(); }, 300); }
                self.route();
            }, 500);
            
            window.addEventListener('hashchange', function() { self.route(); });
        },
        
        route: function() {
            var hash = window.location.hash.slice(1) || '/login';
            var page = hash.split('/')[1] || 'login';
            var app = document.getElementById('app');
            
            if (this.currentUser) {
                if (page === 'login' || page === 'register' || page === 'splash') {
                    page = 'dashboard';
                }
            }
            
            switch(page) {
                case 'login': app.innerHTML = this.loginPage(); this.loginEvents(); break;
                case 'register': app.innerHTML = this.registerPage(); this.registerEvents(); break;
                case 'dashboard': app.innerHTML = this.dashboardPage(); this.dashEvents(); break;
                case 'subjects': app.innerHTML = this.subjectsPage(); break;
                case 'attendance': app.innerHTML = this.attendancePage(); break;
                case 'assignments': app.innerHTML = this.assignmentsPage(); break;
                case 'notes': app.innerHTML = this.notesPage(); break;
                case 'timetable': app.innerHTML = this.timetablePage(); break;
                case 'teachers': app.innerHTML = this.teachersPage(); break;
                case 'quiz': app.innerHTML = this.quizPage(); break;
                case 'results': app.innerHTML = this.resultsPage(); break;
                case 'ai': app.innerHTML = this.aiPage(); break;
                case 'profile': app.innerHTML = this.profilePage(); break;
                case 'settings': app.innerHTML = this.settingsPage(); break;
                default: app.innerHTML = this.dashboardPage(); this.dashEvents();
            }
        },
        
        loginPage: function() {
            return '<div class="container"><div class="card"><h1>🎓 Welcome Back!</h1><p class="subtitle">Sign in to continue</p><form id="loginForm"><div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" required></div><button type="submit" class="btn btn-primary">Sign In</button></form><p class="text-center text-sm text-gray mt-3">New here? <a href="#/register" class="link">Create Account</a></p><p class="text-center text-xs text-gray mt-2">Any email & password works</p></div></div>';
        },
        
        loginEvents: function() {
            var self = this;
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                var email = document.getElementById('loginEmail').value.trim();
                var pass = document.getElementById('loginPass').value;
                if (!email || !pass) { alert('Please fill all fields'); return; }
                
                self.currentUser = { name: email.split('@')[0], email: email, phone: '' };
                localStorage.setItem('student_user', JSON.stringify(self.currentUser));
                window.location.hash = '#/dashboard';
            });
        },
        
        registerPage: function() {
            return '<div class="container"><div class="card"><h1>Create Account</h1><p class="subtitle">Start your journey</p><div class="flex items-center justify-center gap-2 mb-4"><div class="step-dot step-active" id="d1">1</div><div class="step-line"></div><div class="step-dot" id="d2">2</div></div><div id="s1"><div class="form-group"><label>Full Name *</label><input type="text" id="regName" placeholder="John Doe"></div><div class="form-group"><label>Email *</label><input type="email" id="regEmail" placeholder="you@email.com"></div><div class="form-group"><label>Phone</label><input type="tel" id="regPhone" placeholder="+91 9876543210"></div><button type="button" class="btn btn-primary" id="nextBtn">Continue →</button></div><div id="s2" style="display:none"><div class="form-group"><label>Password *</label><input type="password" id="regPass" placeholder="Min 6 characters"></div><div class="form-group"><label>Confirm Password *</label><input type="password" id="regConfirm" placeholder="Re-enter"></div><div class="flex gap-2"><button type="button" class="btn btn-outline" id="backBtn">← Back</button><button type="button" class="btn btn-primary" id="regSubmit">Create Account</button></div></div><p class="text-center text-sm text-gray mt-3">Have account? <a href="#/login" class="link">Sign in</a></p></div></div>';
        },
        
        registerEvents: function() {
            var self = this;
            document.getElementById('nextBtn').addEventListener('click', function() {
                var name = document.getElementById('regName').value.trim();
                var email = document.getElementById('regEmail').value.trim();
                if (!name) { alert('Enter your name'); return; }
                if (!email || email.indexOf('@') === -1) { alert('Enter valid email'); return; }
                document.getElementById('s1').style.display = 'none';
                document.getElementById('s2').style.display = 'block';
                document.getElementById('d1').className = 'step-dot step-done';
                document.getElementById('d2').className = 'step-dot step-active';
            });
            document.getElementById('backBtn').addEventListener('click', function() {
                document.getElementById('s2').style.display = 'none';
                document.getElementById('s1').style.display = 'block';
                document.getElementById('d1').className = 'step-dot step-active';
                document.getElementById('d2').className = 'step-dot';
            });
            document.getElementById('regSubmit').addEventListener('click', function() {
                var name = document.getElementById('regName').value.trim();
                var email = document.getElementById('regEmail').value.trim();
                var phone = document.getElementById('regPhone').value.trim();
                var pass = document.getElementById('regPass').value;
                var confirm = document.getElementById('regConfirm').value;
                if (pass.length < 6) { alert('Password min 6 characters'); return; }
                if (pass !== confirm) { alert('Passwords do not match'); return; }
                
                self.currentUser = { name: name, email: email, phone: phone };
                localStorage.setItem('student_user', JSON.stringify(self.currentUser));
                window.location.hash = '#/dashboard';
            });
        },
        
        dashboardPage: function() {
            var name = (this.currentUser && this.currentUser.name) ? this.currentUser.name : 'Student';
            return '<div style="padding:16px;padding-bottom:80px;min-height:100vh;background:#F9FAFB"><div class="flex items-center gap-3 mb-4" style="background:#fff;padding:16px;border-radius:12px;border:1px solid #E5E7EB"><div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#1D4ED8);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff">👤</div><div><p class="text-xs text-gray">Welcome 👋</p><h2 style="font-size:17px;font-weight:700">'+name+'</h2></div></div><div class="grid-2 mb-4"><div class="stat-box"><div class="stat-val">6</div><div class="stat-lbl">📚 Subjects</div></div><div class="stat-box"><div class="stat-val" style="color:#22C55E">85%</div><div class="stat-lbl">✅ Attendance</div></div><div class="stat-box"><div class="stat-val" style="color:#F59E0B">4</div><div class="stat-lbl">📝 Pending</div></div><div class="stat-box"><div class="stat-val">3.8</div><div class="stat-lbl">⭐ GPA</div></div></div><h3 style="font-weight:600;margin-bottom:10px">⚡ Quick Actions</h3><div class="grid-4 mb-4">'+this.qBtn('#/quiz','🎯','Quiz')+this.qBtn('#/attendance','📊','Attendance')+this.qBtn('#/subjects','📚','Subjects')+this.qBtn('#/ai','🤖','AI Help')+'</div><h3 style="font-weight:600;margin-bottom:10px">📱 Pages</h3><div class="grid-3">'+this.navBtn('#/profile','👤 Profile')+this.navBtn('#/assignments','📋 Assignments')+this.navBtn('#/notes','📖 Notes')+this.navBtn('#/timetable','📅 Timetable')+this.navBtn('#/teachers','👨‍🏫 Teachers')+this.navBtn('#/results','📈 Results')+this.navBtn('#/settings','⚙️ Settings')+'</div><button onclick="App.logout()" style="width:100%;margin-top:16px;padding:12px;background:#FEE2E2;color:#EF4444;border:1px solid #FECACA;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">🚪 Logout</button></div>'+this.bottomNav('dashboard');
        },
        
        dashEvents: function() {},
        
        qBtn: function(link, icon, label) {
            return '<a href="'+link+'" style="text-decoration:none"><div class="stat-box"><div style="font-size:24px">'+icon+'</div><div class="stat-lbl">'+label+'</div></div></a>';
        },
        
        navBtn: function(link, label) {
            return '<a href="'+link+'" style="text-decoration:none"><div class="stat-box">'+label+'</div></a>';
        },
        
        bottomNav: function(active) {
            var items = [
                { page: 'dashboard', icon: '🏠', label: 'Home' },
                { page: 'subjects', icon: '📚', label: 'Subjects' },
                { page: 'quiz', icon: '🎯', label: 'Quiz' },
                { page: 'notes', icon: '📖', label: 'Notes' },
                { page: 'profile', icon: '👤', label: 'Profile' }
            ];
            var html = '<div class="nav-bar">';
            items.forEach(function(item) {
                var cls = (item.page === active) ? 'nav-item nav-active' : 'nav-item';
                html += '<button class="'+cls+'" onclick="App.go(\''+item.page+'\')"><span class="nav-icon">'+item.icon+'</span>'+item.label+'</button>';
            });
            return html + '</div>';
        },
        
        go: function(page) {
            window.location.hash = '#/' + page;
        },
        
        logout: function() {
            this.currentUser = null;
            localStorage.removeItem('student_user');
            window.location.hash = '#/login';
        },
        
        subjectsPage: function() {
            return '<div style="padding:16px;padding-bottom:80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">📚 Subjects</h2><div class="grid-2">'+this.subj('📐','Mathematics','Prof. Sharma','92%','#3B82F6')+this.subj('⚡','Physics','Dr. Patel','78%','#8B5CF6')+this.subj('🧪','Chemistry','Dr. Reddy','72%','#22C55E')+this.subj('💻','Computer Science','Prof. Kumar','88%','#F59E0B')+this.subj('📖','English','Prof. Thomas','96%','#EC4899')+'</div></div>'+this.bottomNav('subjects');
        },
        
        subj: function(icon, name, teacher, att, color) {
            return '<div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #E5E7EB;border-left:4px solid '+color+'"><div style="font-size:24px">'+icon+'</div><div style="font-weight:600;font-size:14px;margin-top:4px">'+name+'</div><div style="font-size:11px;color:#6B7280">'+teacher+'</div><div style="font-weight:700;margin-top:4px;color:'+color+'">'+att+'</div></div>';
        },
        
        attendancePage: function() {
            return '<div style="padding:16px;padding-bottom:80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">📊 Attendance</h2><div style="background:#fff;border-radius:12px;padding:20px;text-align:center;border:1px solid #E5E7EB;margin-bottom:12px"><div style="font-size:48px;color:#22C55E">85%</div><p style="color:#6B7280">Overall Attendance</p></div>'+this.attRow('📐','Mathematics','92%')+this.attRow('⚡','Physics','78%')+this.attRow('🧪','Chemistry','72%')+'</div>'+this.bottomNav('attendance');
        },
        
        attRow: function(icon, name, pct) {
            return '<div style="background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #E5E7EB;display:flex;justify-content:space-between;align-items:center"><span>'+icon+' '+name+'</span><span style="font-weight:700">'+pct+'</span></div>';
        },
        
        assignmentsPage: function() {
            return '<div style="padding:16px;padding-bottom:80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">📋 Assignments</h2>'+this.asgn('Pending','Calculus Problem Set','Due Tomorrow','badge-yellow')+this.asgn('Submitted','Physics Lab Report','Submitted Oct 12','badge-blue')+this.asgn('Graded','Data Structures','Score: 18/20 A+','badge-green')+'</div>'+this.bottomNav('assignments');
        },
        
        asgn: function(status, title, sub, badge) {
            return '<div style="background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #E5E7EB"><span class="badge '+badge+'">'+status+'</span><div style="font-weight:600;font-size:14px;margin-top:4px">'+title+'</div><div style="font-size:12px;color:#6B7280">'+sub+'</div></div>';
        },
        
        notesPage: function() {
            return '<div style="padding:16px;padding-bottom:80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">📖 Notes</h2><div class="grid-2">'+this.note('📐','Trigonometry Formulas','Mathematics')+this.note('⚡','Ohm\'s Law','Physics')+this.note('💻','Python Cheat Sheet','CS')+this.note('🧪','Periodic Table','Chemistry')+'</div></div>'+this.bottomNav('notes');
        },
        
        note: function(icon, title, subj) {
            return '<div style="background:#fff;border-radius:10px;padding:14px;border:1px solid #E5E7EB"><div style="font-size:28px">'+icon+'</div><div style="font-weight:600;font-size:13px;margin-top:4px">'+title+'</div><div style="font-size:11px;color:#6B7280">'+subj+'</div></div>';
        },
        
        timetablePage: function() {
            return '<div style="padding:16px;padding-bottom:80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">📅 Timetable</h2><p style="color:#6B7280;margin-bottom:12px">Monday</p>'+this.ttRow('09:00','Mathematics','Room 301','#3B82F6')+this.ttRow('10:00','Physics Lab','Lab 102','#8B5CF6')+this.ttRow('11:30','Chemistry','Room 205','#22C55E')+this.ttRow('13:30','Computer Science','Lab 1','#F59E0B')+'</div>'+this.bottomNav('timetable');
        },
        
        ttRow: function(time, subj, room, color) {
            return '<div style="background:#fff;border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid #E5E7EB;display:flex;gap:12px;align-items:center;border-left:4px solid '+color+'"><span style="font-weight:700;font-size:13px;min-width:45px">'+time+'</span><div><div style="font-weight:600;font-size:13px">'+subj+'</div><div style="font-size:11px;color:#6B7280">'+room+'</div></div></div>';
        },
        
        teachersPage: function() {
            return '<div style="padding:16px;padding-bottom:80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">👨‍🏫 Teachers</h2>'+this.tch('👨‍🏫','Prof. R.K. Sharma','
